# Rate limiting zones defined in http context (assumes this file is included within http block)
limit_req_zone $binary_remote_addr zone=orders_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=reviews_limit:10m rate=3r/m;

server {
    listen 80;
    server_name localhost;

    # CORS Lockdown to Production Domain
    # Enforces single origin header matching for security in Nginx
    set $cors_origin "";
    if ($http_origin ~* (https://(www\.)?zappy\.ind\.in)) {
        set $cors_origin $http_origin;
    }
    
    # Security Headers (Phase 4 Hardening & Custom CSP Rules)
    # Explictly allows only self, Supabase database + WebSocket connection, images from storage/CDN, and fonts
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
    
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://copkzrwvpqfjpsyyyqdy.supabase.co https://images.unsplash.com https://api.dicebear.com blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://copkzrwvpqfjpsyyyqdy.supabase.co wss://copkzrwvpqfjpsyyyqdy.supabase.co; frame-ancestors 'none';" always;
    
    # HSTS Policy (enforce HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing fallback (Vite SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Rate limiting application for critical actions
    location /api/orders {
        limit_req zone=orders_limit burst=5 nodelay;
        proxy_pass http://localhost:8000; # Proxy back to Supabase backend / local APIs
    }

    location /api/reviews {
        limit_req zone=reviews_limit burst=3 nodelay;
        proxy_pass http://localhost:8000;
    }

    # Cache Control for compiled static assets (immutable)
    location ~* \.(?:css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Cache Control for static media assets
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|avif|woff|woff2)$ {
        expires 1M;
        add_header Cache-Control "public, max-age=2592000, must-revalidate";
        access_log off;
    }

    error_page 404 /index.html;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
