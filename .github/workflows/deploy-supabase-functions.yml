name: Deploy Supabase Functions

on:
  push:
    branches: [ main ]

jobs:
  deploy-functions:
    name: Deploy Supabase Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install supabase CLI
        run: npm install -g supabase

      - name: Deploy all functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "Authenticating supabase CLI..."
          supabase login --no-local-server --token "$SUPABASE_ACCESS_TOKEN" || true
          for fn in supabase/functions/*; do
            if [ -d "$fn" ]; then
              name=$(basename "$fn")
              echo "Deploying function: $name"
              supabase functions deploy "$name" --project-ref "$SUPABASE_PROJECT_REF" --no-verify || exit 1
            fi
          done
