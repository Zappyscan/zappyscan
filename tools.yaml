sources:
  - kind: source
    name: my-postgres
    type: postgres
    host: db.copkzrwvpqfjpsyyyqdy.supabase.co
    port: 5432
    database: postgres
    user: postgres
    password: YOUR_PASSWORD

tools:
  - kind: tool
    name: get_restaurants
    type: postgres-sql
    source: my-postgres
    description: Get restaurant list
    statement: |
      SELECT id, name
      FROM restaurants
      LIMIT 20;

  - kind: tool
    name: top_restaurants
    type: postgres-sql
    source: my-postgres
    description: Top restaurants by orders
    statement: |
      SELECT
        r.name,
        COUNT(o.id) as total_orders
      FROM restaurants r
      JOIN orders o ON o.restaurant_id = r.id
      GROUP BY r.name
      ORDER BY total_orders DESC
      LIMIT 20;
